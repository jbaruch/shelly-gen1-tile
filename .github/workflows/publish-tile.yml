name: Publish Tile

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_API_TOKEN }}
      - uses: jbaruch/tessl-smart-publish@v1
